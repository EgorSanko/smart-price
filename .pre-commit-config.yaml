repos:
  # Pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict

  # Ruff - Python linter and formatter
  # NB: ruff lint временно отключён — codebase backend/ имеет ~366 ошибок
  # стиля/качества, никогда не линтился. TODO: прогнать `ruff check --fix
  # backend/app` отдельным cleanup PR и re-enable. ruff-format остаётся
  # активным (auto-fix форматирования при коммите).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.1
    hooks:
      # - id: ruff
      #   args: [--fix, --exit-non-zero-on-fix]
      #   types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # MyPy - Type checking
  # TODO: re-enable после прогона `mypy backend/app` и фикса всех ошибок
  # типизации (~60 файлов backend/, никогда не валидировались).
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       args: [--ignore-missing-imports]
  #       additional_dependencies:
  #         - pydantic>=2.0
  #         - types-python-dateutil
  #         - sqlalchemy[mypy]>=2.0

  # Security checks
  # TODO: re-enable после переноса pyproject.toml в корень или pin относительного
  # пути к backend/pyproject.toml. Bandit ищет конфиг в CWD = repo root,
  # которого здесь нет.
  # - repo: https://github.com/PyCQA/bandit
  #   rev: 1.7.7
  #   hooks:
  #     - id: bandit
  #       args: ["-c", "pyproject.toml"]
  #       additional_dependencies: ["bandit[toml]"]
  #       exclude: tests/

  # Commit message format
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.1.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, test, chore, ci, perf]

# Configuration
ci:
  autofix_commit_msg: "style: auto-fix by pre-commit hooks"
  autoupdate_commit_msg: "chore: update pre-commit hooks"
