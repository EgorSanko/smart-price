<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Price - Умный поиск цен</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 0; }
        h1 { font-size: 2.5em; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .subtitle { color: #888; margin-top: 10px; }
        .search-box { display: flex; gap: 10px; max-width: 700px; margin: 30px auto; }
        .search-box input { flex: 1; padding: 18px 25px; font-size: 18px; border: none; border-radius: 50px; background: #1a1a2e; color: #fff; outline: none; }
        .search-box button { padding: 18px 40px; font-size: 18px; border: none; border-radius: 50px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; cursor: pointer; }
        .search-box button:disabled { opacity: 0.6; cursor: not-allowed; }
        .main { display: grid; grid-template-columns: 1fr 350px; gap: 30px; margin-top: 30px; }
        @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
        .results { background: #1a1a2e; border-radius: 20px; padding: 25px; min-height: 400px; }
        .chat { background: #1a1a2e; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; height: 500px; }
        .status-box { background: linear-gradient(135deg, #1e3a5f, #2d1b4e); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .status-step { padding: 8px 0; font-size: 14px; color: #a5b4fc; }
        .status-step.done { color: #4ade80; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #667eea; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .best-price { background: linear-gradient(135deg, #059669, #10b981); border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .best-price .label { font-size: 12px; text-transform: uppercase; opacity: 0.8; }
        .best-price .price { font-size: 2.2em; font-weight: bold; }
        .best-price .title { margin-top: 10px; opacity: 0.9; font-size: 14px; }
        .best-price .mp { display: inline-block; padding: 4px 12px; border-radius: 15px; font-size: 12px; margin-top: 10px; }
        .mp-wildberries { background: #cb11ab; }
        .mp-yandex { background: #fc0; color: #000; }
        .mp-ozon { background: #005bff; }
        .best-price a { display: inline-block; margin-top: 15px; padding: 12px 25px; background: rgba(255,255,255,0.2); border-radius: 25px; color: #fff; text-decoration: none; }
        .summary-box { background: rgba(102, 126, 234, 0.1); border: 1px solid rgba(102, 126, 234, 0.3); border-radius: 12px; padding: 15px; margin-bottom: 20px; font-size: 14px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .product-card { background: #252540; border-radius: 12px; padding: 15px; }
        .product-card .price { font-size: 1.3em; font-weight: bold; color: #4ade80; }
        .product-card .title { font-size: 12px; color: #ccc; margin: 10px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-card .mp { font-size: 11px; padding: 3px 8px; border-radius: 10px; }
        .product-card a { display: block; margin-top: 10px; padding: 8px; background: rgba(102,126,234,0.3); border-radius: 8px; color: #fff; text-decoration: none; text-align: center; font-size: 13px; }
        .excluded { margin-top: 20px; padding-top: 15px; border-top: 1px solid #333; }
        .excluded summary { cursor: pointer; color: #888; font-size: 14px; }
        .excluded-item { font-size: 12px; color: #666; padding: 4px 0; }
        .chat-header { display: flex; align-items: center; gap: 12px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .chat-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #f472b6, #8b5cf6); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px 0; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
        .message.bot { background: linear-gradient(135deg, #f472b6, #8b5cf6); align-self: flex-start; }
        .message.user { background: #3b3b5c; align-self: flex-end; }
        .chat-input { display: flex; gap: 10px; padding-top: 15px; border-top: 1px solid #333; }
        .chat-input input { flex: 1; padding: 12px 16px; border: none; border-radius: 20px; background: #252540; color: #fff; outline: none; }
        .chat-input button { padding: 12px 20px; border: none; border-radius: 20px; background: linear-gradient(135deg, #f472b6, #8b5cf6); color: #fff; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Smart Price</h1>
            <p class="subtitle">Умный поиск лучших цен с AI-анализом</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Например: airpods pro 2" onkeypress="if(event.key==='Enter')search()">
            <button id="searchBtn" onclick="search()">Найти</button>
        </div>

        <div class="main">
            <div class="results">
                <div id="statusBox" class="status-box hidden"></div>
                <div id="resultsContent">
                    <p style="color:#666; text-align:center; padding: 50px;">Введите запрос для поиска</p>
                </div>
            </div>

            <div class="chat">
                <div class="chat-header">
                    <div class="chat-avatar"></div>
                    <div>
                        <div style="font-weight:600;">Фиксик-помогатор</div>
                        <div style="font-size:11px;color:#888;">AI-ассистент</div>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot">Привет! Помогу выбрать товар или отвечу на вопросы </div>
                </div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Спросите..." onkeypress="if(event.key==='Enter')sendChat()">
                    <button onclick="sendChat()"></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = '';
        let lastContext = '';

        function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.textContent = 'Ищем...';

            const statusBox = document.getElementById('statusBox');
            statusBox.classList.remove('hidden');
            statusBox.innerHTML = '<div class="status-step"><span class="spinner"></span> Начинаем поиск...</div>';
            document.getElementById('resultsContent').innerHTML = '';

            const evtSource = new EventSource(API + '/api/search/stream?q=' + encodeURIComponent(query));

            evtSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.step === 'done') {
                    evtSource.close();
                    btn.disabled = false;
                    btn.textContent = 'Найти';
                    statusBox.classList.add('hidden');
                    renderResults(data.result);
                } else {
                    statusBox.innerHTML = '<div class="status-step"><span class="spinner"></span> ' + data.message + '</div>';
                }
            };

            evtSource.onerror = function() {
                evtSource.close();
                btn.disabled = false;
                btn.textContent = 'Найти';
                statusBox.innerHTML = '<div class="status-step" style="color:#f87171;">Ошибка. Попробуйте снова.</div>';
            };
        }

        function renderResults(data) {
            const el = document.getElementById('resultsContent');
            let html = '';

            lastContext = 'Поиск: ' + data.query + '. Найдено: ' + data.total_found;

            // Лучшая цена
            if (data.best_price) {
                const bp = data.best_price;
                const price = bp.price_num || parseInt(String(bp.price).replace(/\D/g, '')) || 0;
                const mp = bp.marketplace || 'unknown';
                html += '<div class="best-price">';
                html += '<div class="label"> Лучшая цена</div>';
                html += '<div class="price">' + price.toLocaleString('ru') + ' ₽</div>';
                html += '<div class="title">' + (bp.title || 'Товар') + '</div>';
                html += '<span class="mp mp-' + mp + '">' + mp + '</span>';
                if (bp.url) html += '<br><a href="' + bp.url + '" target="_blank">Перейти в магазин </a>';
                html += '</div>';
            }

            // Саммари
            if (data.summary) {
                html += '<div class="summary-box"> ' + data.summary + '</div>';
            }

            // Товары
            const products = data.matching_products || [];
            html += '<h3 style="margin:15px 0;">Результаты <span style="background:#4ade80;color:#000;padding:2px 10px;border-radius:15px;font-size:13px;">' + products.length + ' подходящих</span></h3>';
            
            if (products.length > 0) {
                html += '<div class="products-grid">';
                products.forEach(function(p) {
                    const price = p.price_num || parseInt(String(p.price).replace(/\D/g, '')) || 0;
                    const mp = p.marketplace || 'unknown';
                    html += '<div class="product-card">';
                    html += '<div class="price">' + price.toLocaleString('ru') + ' ₽</div>';
                    html += '<div class="title">' + (p.title || '') + '</div>';
                    html += '<span class="mp mp-' + mp + '">' + mp + '</span>';
                    if (p.url) html += '<a href="' + p.url + '" target="_blank">Купить</a>';
                    html += '</div>';
                });
                html += '</div>';
            } else {
                html += '<p style="color:#888;text-align:center;padding:30px;">Подходящих товаров не найдено</p>';
            }

            // Исключённые
            const excluded = data.excluded || [];
            if (excluded.length > 0) {
                html += '<details class="excluded"><summary>Отфильтровано: ' + excluded.length + '</summary>';
                excluded.forEach(function(e) {
                    html += '<div class="excluded-item"> ' + (e.title || '') + '  ' + (e.reason || '') + '</div>';
                });
                html += '</details>';
            }

            el.innerHTML = html;
        }

        function sendChat() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;

            const msgs = document.getElementById('chatMessages');
            msgs.innerHTML += '<div class="message user">' + msg + '</div>';
            input.value = '';
            msgs.scrollTop = msgs.scrollHeight;

            fetch(API + '/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg, context: lastContext })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                msgs.innerHTML += '<div class="message bot">' + data.response + '</div>';
                msgs.scrollTop = msgs.scrollHeight;
            })
            .catch(function() {
                msgs.innerHTML += '<div class="message bot">Ошибка связи </div>';
            });
        }
    </script>
</body>
</html>
