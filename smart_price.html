<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Price  Умный поиск цен</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; }
        .logo {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #888; margin-top: 5px; }
        .search-box { display: flex; gap: 10px; max-width: 700px; margin: 30px auto; }
        .search-input {
            flex: 1; padding: 18px 25px; font-size: 18px; border: none; border-radius: 15px;
            background: rgba(255,255,255,0.1); color: #fff; outline: none;
        }
        .search-input:focus { background: rgba(255,255,255,0.15); box-shadow: 0 0 20px rgba(0,210,255,0.3); }
        .search-input::placeholder { color: #666; }
        .search-btn {
            padding: 18px 35px; font-size: 18px; border: none; border-radius: 15px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5); color: #fff; cursor: pointer; font-weight: 600;
        }
        .search-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,210,255,0.4); }
        .search-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .main-layout { display: grid; grid-template-columns: 1fr 400px; gap: 30px; margin-top: 30px; }
        @media (max-width: 1000px) { .main-layout { grid-template-columns: 1fr; } }
        .results-section h2 { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .badge { background: #3a7bd5; padding: 5px 12px; border-radius: 20px; font-size: 14px; }
        .best-price {
            background: linear-gradient(135deg, #00b894, #00cec9); padding: 25px; border-radius: 20px; margin-bottom: 25px;
        }
        .best-price h3 { font-size: 14px; opacity: 0.9; margin-bottom: 10px; }
        .best-price .price { font-size: 2.5em; font-weight: 700; }
        .best-price .title { margin-top: 10px; opacity: 0.9; }
        .best-price .marketplace { display: inline-block; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 10px; margin-top: 10px; font-size: 14px; }
        .best-price a { display: inline-block; margin-top: 15px; padding: 12px 25px; background: rgba(255,255,255,0.2); border-radius: 10px; color: #fff; text-decoration: none; }
        .ai-summary { background: rgba(58,123,213,0.2); border-left: 4px solid #3a7bd5; padding: 15px 20px; border-radius: 0 15px 15px 0; margin-bottom: 25px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); }
        .marketplace-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; margin-bottom: 10px; }
        .marketplace-badge.wildberries { background: #cb11ab; }
        .marketplace-badge.ozon { background: #005bff; }
        .marketplace-badge.yandex { background: #fc0; color: #000; }
        .product-card .title { font-size: 14px; line-height: 1.4; height: 40px; overflow: hidden; margin-bottom: 10px; }
        .product-card .price { font-size: 1.5em; font-weight: 700; color: #00d2ff; }
        .product-card a { display: block; margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 8px; color: #fff; text-decoration: none; text-align: center; font-size: 14px; }
        .excluded-section { margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 15px; }
        .excluded-section h3 { color: #888; font-size: 14px; margin-bottom: 15px; }
        .excluded-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; color: #666; }
        .excluded-item .reason { color: #e74c3c; }
        .chat-section { background: rgba(255,255,255,0.05); border-radius: 20px; display: flex; flex-direction: column; height: 600px; }
        .chat-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px; }
        .chat-avatar { width: 50px; height: 50px; background: linear-gradient(135deg, #f093fb, #f5576c); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .chat-header h3 { font-size: 18px; }
        .chat-header p { font-size: 12px; color: #888; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; display: flex; gap: 10px; }
        .message.user { flex-direction: row-reverse; }
        .message-avatar { width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .message.assistant .message-avatar { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .message.user .message-avatar { background: #3a7bd5; }
        .message-content { background: rgba(255,255,255,0.1); padding: 12px 16px; border-radius: 15px; max-width: 80%; line-height: 1.5; }
        .message.user .message-content { background: #3a7bd5; }
        .chat-input-box { padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
        .chat-input { flex: 1; padding: 12px 18px; border: none; border-radius: 12px; background: rgba(255,255,255,0.1); color: #fff; outline: none; font-size: 14px; }
        .chat-input::placeholder { color: #666; }
        .chat-send { padding: 12px 20px; border: none; border-radius: 12px; background: linear-gradient(90deg, #f093fb, #f5576c); color: #fff; cursor: pointer; font-weight: 600; }
        .loading { text-align: center; padding: 50px; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #00d2ff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .empty-state .icon { font-size: 4em; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Smart Price</div>
            <p class="subtitle">Умный поиск лучших цен с AI-анализом</p>
        </header>
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Что ищем? Например: iPhone 16 128GB" onkeypress="if(event.key==='Enter') search()">
            <button class="search-btn" id="searchBtn" onclick="search()">Найти</button>
        </div>
        <div class="main-layout">
            <div class="results-section" id="results">
                <div class="empty-state">
                    <div class="icon"></div>
                    <h3>Введите запрос для поиска</h3>
                    <p>Мы найдём лучшие цены на Wildberries, Ozon и Яндекс.Маркет</p>
                </div>
            </div>
            <div class="chat-section">
                <div class="chat-header">
                    <div class="chat-avatar"></div>
                    <div><h3>Фиксик-помогатор</h3><p>AI-ассистент для шоппинга</p></div>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="message assistant">
                        <div class="message-avatar"></div>
                        <div class="message-content">Привет! Я Фиксик-помогатор. Помогу выбрать товар, сравню характеристики или отвечу на вопросы. Спрашивай!</div>
                    </div>
                </div>
                <div class="chat-input-box">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Спросите что-нибудь..." onkeypress="if(event.key==='Enter') sendChat()">
                    <button class="chat-send" onclick="sendChat()">Отправить</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API = 'http://localhost:5000';
        let lastSearchContext = '';
        async function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            const btn = document.getElementById('searchBtn');
            const results = document.getElementById('results');
            btn.disabled = true; btn.textContent = 'Ищем...';
            results.innerHTML = '<div class="loading"><div class="spinner"></div><p>Ищем на маркетплейсах...</p><p style="color:#666;font-size:14px;margin-top:10px">Это займёт 20-30 секунд</p></div>';
            try {
                const res = await fetch(API + '/api/search?q=' + encodeURIComponent(query) + '&ai=true');
                const data = await res.json();
                lastSearchContext = JSON.stringify({query: data.query, best_price: data.best_price, total: data.total_matching});
                renderResults(data);
            } catch (e) { results.innerHTML = '<div class="empty-state"><div class="icon">Error</div><h3>Ошибка</h3><p>' + e.message + '</p></div>'; }
            btn.disabled = false; btn.textContent = 'Найти';
        }
        function renderResults(data) {
            const results = document.getElementById('results');
            let html = '<h2>Результаты <span class="badge">' + (data.total_matching || 0) + ' подходящих</span></h2>';
            if (data.best_price) {
                const bp = data.best_price;
                html += '<div class="best-price"><h3>ЛУЧШАЯ ЦЕНА</h3><div class="price">' + (bp.price_num ? bp.price_num.toLocaleString() : bp.price) + ' руб</div><div class="title">' + bp.title + '</div><span class="marketplace">' + bp.marketplace + '</span>' + (bp.url ? '<br><a href="' + bp.url + '" target="_blank">Перейти в магазин</a>' : '') + '</div>';
            }
            if (data.summary) { html += '<div class="ai-summary"> ' + data.summary + '</div>'; }
            const products = data.matching_products || data.products || [];
            if (products.length > 0) {
                html += '<div class="products-grid">';
                products.forEach(function(p) {
                    html += '<div class="product-card"><span class="marketplace-badge ' + p.marketplace + '">' + p.marketplace + '</span><div class="title">' + p.title + '</div><div class="price">' + (p.price_num ? p.price_num.toLocaleString() : p.price) + ' руб</div>' + (p.url ? '<a href="' + p.url + '" target="_blank">Купить</a>' : '') + '</div>';
                });
                html += '</div>';
            }
            if (data.excluded && data.excluded.length > 0) {
                html += '<div class="excluded-section"><h3>Исключено AI (' + data.excluded.length + ')</h3>';
                data.excluded.slice(0, 5).forEach(function(e) {
                    html += '<div class="excluded-item"><span>' + (e.title ? e.title.substring(0, 40) : '') + '...</span><span class="reason">' + e.reason + '</span></div>';
                });
                html += '</div>';
            }
            results.innerHTML = html;
        }
        async function sendChat() {
            const input = document.getElementById('chatInput');
            const messages = document.getElementById('chatMessages');
            const message = input.value.trim();
            if (!message) return;
            messages.innerHTML += '<div class="message user"><div class="message-avatar"></div><div class="message-content">' + message + '</div></div>';
            input.value = '';
            messages.scrollTop = messages.scrollHeight;
            const loadingId = 'loading-' + Date.now();
            messages.innerHTML += '<div class="message assistant" id="' + loadingId + '"><div class="message-avatar"></div><div class="message-content">Думаю...</div></div>';
            messages.scrollTop = messages.scrollHeight;
            try {
                const res = await fetch(API + '/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ message: message, context: lastSearchContext }) });
                const data = await res.json();
                document.getElementById(loadingId).querySelector('.message-content').innerHTML = data.response;
            } catch (e) { document.getElementById(loadingId).querySelector('.message-content').innerHTML = 'Ошибка: ' + e.message; }
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
