version: '3.8'

services:
  # ===========================================
  # BACKEND - FastAPI Application
  # ===========================================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: smart_price_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://smartprice:smartprice@postgres:5432/smartprice
      - REDIS_URL=redis://redis:6379/0
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      # Browserless для Playwright
      - PLAYWRIGHT_WS_ENDPOINT=ws://browserless:3000
      - USE_BROWSERLESS=true
    volumes:
      - ../backend/app:/app/app:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      browserless:
        condition: service_started
    restart: unless-stopped
    networks:
      - smart_price_network

  # ===========================================
  # BROWSERLESS - Headless Chrome for scraping
  # ===========================================
  # Ключевой сервис для обхода блокировок!
  # Предоставляет Chrome через WebSocket для Playwright
  browserless:
    image: browserless/chrome:latest
    container_name: smart_price_browserless
    hostname: browserless
    ports:
      - "3001:3000"  # Web UI для отладки: http://localhost:3001
    environment:
      # Stealth mode - маскируемся под обычный браузер
      - DEFAULT_STEALTH=true
      - DEFAULT_BLOCK_ADS=true
      - DEFAULT_IGNORE_HTTPS_ERRORS=true
      # Предзагрузка Chrome для быстрого старта
      - PREBOOT_CHROME=true
      - KEEP_ALIVE=true
      # Ресурсы
      - MAX_CONCURRENT_SESSIONS=5
      - CONNECTION_TIMEOUT=60000
      - MAX_QUEUE_LENGTH=10
      # Экран
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1080
      - SCREEN_DEPTH=24
      # Отладка (отключить в проде)
      - ENABLE_DEBUGGER=false
      - ENABLE_CORS=true
    shm_size: '2gb'  # Важно для Chrome!
    restart: unless-stopped
    networks:
      - smart_price_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/pressure"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # PostgreSQL - Main Database
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: smart_price_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=smartprice
      - POSTGRES_USER=smartprice
      - POSTGRES_PASSWORD=smartprice
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    networks:
      - smart_price_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartprice -d smartprice"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Redis - Cache & Celery Broker
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: smart_price_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - smart_price_network

  # ===========================================
  # ClickHouse - Analytics Database
  # ===========================================
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: smart_price_clickhouse
    ports:
      - "8123:8123"  # HTTP
      - "9000:9000"  # Native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - CLICKHOUSE_DB=smartprice
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
    restart: unless-stopped
    networks:
      - smart_price_network

  # ===========================================
  # Celery Worker - Background Tasks
  # ===========================================
  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: smart_price_celery_worker
    command: celery -A app.celery_app worker -l info -c 2
    environment:
      - DATABASE_URL=postgresql+asyncpg://smartprice:smartprice@postgres:5432/smartprice
      - REDIS_URL=redis://redis:6379/0
      - PLAYWRIGHT_WS_ENDPOINT=ws://browserless:3000
      - USE_BROWSERLESS=true
    volumes:
      - ../backend/app:/app/app:ro
    depends_on:
      - postgres
      - redis
      - browserless
    restart: unless-stopped
    networks:
      - smart_price_network

  # ===========================================
  # Celery Beat - Scheduler
  # ===========================================
  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: smart_price_celery_beat
    command: celery -A app.celery_app beat -l info
    environment:
      - DATABASE_URL=postgresql+asyncpg://smartprice:smartprice@postgres:5432/smartprice
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../backend/app:/app/app:ro
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - smart_price_network

networks:
  smart_price_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
