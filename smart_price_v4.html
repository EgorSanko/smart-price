<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Price - Умный поиск цен</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 0; }
        h1 { font-size: 3em; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #888; margin-top: 10px; }
        .search-box { display: flex; gap: 10px; max-width: 700px; margin: 30px auto; }
        .search-box input { flex: 1; padding: 18px 25px; font-size: 18px; border: none; border-radius: 50px; background: #1a1a2e; color: #fff; outline: none; }
        .search-box input::placeholder { color: #666; }
        .search-box button { padding: 18px 40px; font-size: 18px; border: none; border-radius: 50px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .search-box button:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .search-box button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .main { display: grid; grid-template-columns: 1fr 380px; gap: 30px; margin-top: 30px; }
        @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
        .results { background: #1a1a2e; border-radius: 20px; padding: 25px; min-height: 400px; }
        .chat { background: #1a1a2e; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; height: 600px; }
        .status-box { background: linear-gradient(135deg, #1e3a5f, #2d1b4e); border-radius: 15px; padding: 20px; margin-bottom: 20px; min-height: 120px; }
        .status-title { font-size: 14px; color: #888; margin-bottom: 15px; }
        .status-steps { display: flex; flex-direction: column; gap: 8px; }
        .status-step { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; font-size: 14px; transition: all 0.3s; }
        .status-step.active { background: rgba(102, 126, 234, 0.2); color: #a5b4fc; }
        .status-step.done { color: #4ade80; }
        .status-step .spinner { width: 16px; height: 16px; border: 2px solid #667eea; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .best-price { background: linear-gradient(135deg, #059669, #10b981); border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .best-price .label { font-size: 12px; text-transform: uppercase; opacity: 0.8; }
        .best-price .price { font-size: 2.5em; font-weight: bold; }
        .best-price .title { margin-top: 10px; opacity: 0.9; }
        .best-price .mp { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; margin-top: 10px; }
        .mp-wildberries { background: #cb11ab; }
        .mp-yandex { background: #fc0; color: #000; }
        .mp-ozon { background: #005bff; }
        .best-price a { display: inline-block; margin-top: 15px; padding: 12px 25px; background: rgba(255,255,255,0.2); border-radius: 25px; color: #fff; text-decoration: none; transition: background 0.2s; }
        .best-price a:hover { background: rgba(255,255,255,0.3); }
        .summary-box { background: rgba(102, 126, 234, 0.1); border: 1px solid rgba(102, 126, 234, 0.3); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .summary-box .icon { font-size: 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .product-card { background: #252540; border-radius: 12px; padding: 15px; transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-3px); }
        .product-card .price { font-size: 1.4em; font-weight: bold; color: #4ade80; }
        .product-card .title { font-size: 13px; color: #ccc; margin: 10px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-card .mp { font-size: 11px; padding: 3px 8px; border-radius: 10px; }
        .product-card a { display: block; margin-top: 10px; padding: 8px; background: rgba(102,126,234,0.2); border-radius: 8px; color: #a5b4fc; text-decoration: none; text-align: center; font-size: 13px; }
        .excluded { margin-top: 25px; padding-top: 20px; border-top: 1px solid #333; }
        .excluded summary { cursor: pointer; color: #888; font-size: 14px; }
        .excluded-item { font-size: 13px; color: #666; padding: 5px 0; }
        .chat-header { display: flex; align-items: center; gap: 12px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .chat-avatar { width: 45px; height: 45px; background: linear-gradient(135deg, #f472b6, #8b5cf6); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .message.bot { background: linear-gradient(135deg, #f472b6, #8b5cf6); align-self: flex-start; border-bottom-left-radius: 5px; }
        .message.user { background: #3b3b5c; align-self: flex-end; border-bottom-right-radius: 5px; }
        .chat-input { display: flex; gap: 10px; padding-top: 15px; border-top: 1px solid #333; }
        .chat-input input { flex: 1; padding: 12px 18px; border: none; border-radius: 25px; background: #252540; color: #fff; outline: none; }
        .chat-input button { padding: 12px 25px; border: none; border-radius: 25px; background: linear-gradient(135deg, #f472b6, #8b5cf6); color: #fff; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Smart Price</h1>
            <p class="subtitle">Умный поиск лучших цен с AI-анализом</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Что ищем? Например: дрими л10с ультра" onkeypress="if(event.key==='Enter')search()">
            <button id="searchBtn" onclick="search()">Найти</button>
        </div>

        <div class="main">
            <div class="results">
                <div id="statusBox" class="status-box hidden">
                    <div class="status-title">Статус поиска</div>
                    <div id="statusSteps" class="status-steps"></div>
                </div>
                <div id="resultsContent">
                    <p style="color:#666; text-align:center; padding: 50px;">Введите запрос для поиска товаров</p>
                </div>
            </div>

            <div class="chat">
                <div class="chat-header">
                    <div class="chat-avatar"></div>
                    <div>
                        <div style="font-weight:600;">Фиксик-помогатор</div>
                        <div style="font-size:12px;color:#888;">AI-ассистент для шоппинга</div>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot">Привет! Я Фиксик-помогатор  Помогу выбрать товар, сравню характеристики или отвечу на вопросы. Спрашивай!</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Задайте вопрос..." onkeypress="if(event.key==='Enter')sendChat()">
                    <button onclick="sendChat()"></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = '';
        let lastSearchContext = '';
        let statusSteps = [];

        function addStatus(message, isDone = false) {
            const el = document.getElementById('statusSteps');
            const stepId = 'step-' + statusSteps.length;
            statusSteps.push(stepId);
            
            const step = document.createElement('div');
            step.id = stepId;
            step.className = 'status-step active';
            step.innerHTML = isDone ? `<span></span> ${message}` : `<div class="spinner"></div> ${message}`;
            el.appendChild(step);
            
            return stepId;
        }

        function updateStatus(stepId, message, isDone = true) {
            const el = document.getElementById(stepId);
            if (el) {
                el.className = 'status-step ' + (isDone ? 'done' : 'active');
                el.innerHTML = isDone ? `<span></span> ${message}` : `<div class="spinner"></div> ${message}`;
            }
        }

        function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const btn = document.getElementById('searchBtn');
            btn.disabled = true;
            btn.textContent = 'Ищем...';

            document.getElementById('statusBox').classList.remove('hidden');
            document.getElementById('statusSteps').innerHTML = '';
            document.getElementById('resultsContent').innerHTML = '';
            statusSteps = [];

            const evtSource = new EventSource(API + '/api/search/stream?q=' + encodeURIComponent(query));
            let currentStepId = null;

            evtSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.step === 'normalize') {
                    currentStepId = addStatus(data.message);
                }
                else if (data.step === 'normalized') {
                    if (currentStepId) updateStatus(currentStepId, data.message);
                    currentStepId = null;
                }
                else if (data.step === 'scraping') {
                    currentStepId = addStatus(data.message);
                }
                else if (data.step === 'scraped') {
                    if (currentStepId) updateStatus(currentStepId, data.message);
                    currentStepId = null;
                }
                else if (data.step === 'filtering') {
                    currentStepId = addStatus(data.message);
                }
                else if (data.step === 'done') {
                    if (currentStepId) updateStatus(currentStepId, data.message);
                    evtSource.close();
                    btn.disabled = false;
                    btn.textContent = 'Найти';
                    renderResults(data.result);
                }
            };

            evtSource.onerror = function() {
                evtSource.close();
                btn.disabled = false;
                btn.textContent = 'Найти';
                document.getElementById('statusBox').classList.add('hidden');
                document.getElementById('resultsContent').innerHTML = '<p style="color:#f87171;text-align:center;padding:50px;">Ошибка подключения. Попробуйте снова.</p>';
            };
        }

        function renderResults(data) {
            const el = document.getElementById('resultsContent');
            let html = '';

            lastSearchContext = `Запрос: "${data.query}", нормализован как "${data.normalized_query}". Найдено ${data.total_found} товаров, подходящих ${data.total_matching}.`;

            if (data.best_price) {
                const bp = data.best_price;
                html += `<div class="best-price">
                    <div class="label"> Лучшая цена</div>
                    <div class="price">${bp.price_num?.toLocaleString() || bp.price} ₽</div>
                    <div class="title">${bp.title}</div>
                    <span class="mp mp-${bp.marketplace}">${bp.marketplace}</span>
                    <br><a href="${bp.url}" target="_blank">Перейти в магазин </a>
                </div>`;
                lastSearchContext += ` Лучшая цена: ${bp.price_num || bp.price} руб. на ${bp.marketplace}.`;
            }

            if (data.summary) {
                html += `<div class="summary-box"><span class="icon"></span> ${data.summary}</div>`;
            }

            const products = data.matching_products || [];
            if (products.length > 0) {
                html += `<h3 style="margin-bottom:15px;">Результаты <span style="background:#4ade80;color:#000;padding:3px 10px;border-radius:20px;font-size:14px;">${products.length} подходящих</span></h3>`;
                html += '<div class="products-grid">';
                products.forEach(p => {
                    html += `<div class="product-card">
                        <div class="price">${p.price_num?.toLocaleString() || p.price} ₽</div>
                        <div class="title">${p.title}</div>
                        <span class="mp mp-${p.marketplace}">${p.marketplace}</span>
                        <a href="${p.url}" target="_blank">В магазин</a>
                    </div>`;
                });
                html += '</div>';
            }

            const excluded = data.excluded || [];
            if (excluded.length > 0) {
                html += `<details class="excluded"><summary>Отфильтровано AI: ${excluded.length} товаров</summary>`;
                excluded.forEach(e => {
                    html += `<div class="excluded-item"> ${e.title}  <em>${e.reason}</em></div>`;
                });
                html += '</details>';
            }

            el.innerHTML = html || '<p style="color:#666;text-align:center;padding:50px;">Ничего не найдено</p>';
        }

        function sendChat() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;

            const messages = document.getElementById('chatMessages');
            messages.innerHTML += `<div class="message user">${msg}</div>`;
            input.value = '';
            messages.scrollTop = messages.scrollHeight;

            fetch(API + '/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg, context: lastSearchContext })
            })
            .then(r => r.json())
            .then(data => {
                messages.innerHTML += `<div class="message bot">${data.response}</div>`;
                messages.scrollTop = messages.scrollHeight;
            })
            .catch(() => {
                messages.innerHTML += `<div class="message bot">Ошибка соединения </div>`;
            });
        }
    </script>
</body>
</html>
