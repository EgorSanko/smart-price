version: '3.8'

services:
  # === BACKEND ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: sp_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-smartprice}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-smartprice}
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - APIFY_API_TOKEN=${APIFY_API_TOKEN:-}
      - CORS_ORIGINS=["http://${DOMAIN:-5.42.123.75}","https://${DOMAIN:-5.42.123.75}","http://localhost:3000"]
      - ENVIRONMENT=production
      - DEBUG=true
      - LOG_LEVEL=WARNING
      - SECRET_KEY=${SECRET_KEY}
      - SCRAPER_PROXY=
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # === CHEAPER WORKER (Yandex Alisa automation) ===
  cheaper_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: sp_cheaper_worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-smartprice}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-smartprice}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - SECRET_KEY=${SECRET_KEY}
      - ALISA_STORAGE_STATE=/app/session/yandex_storage.json
      - ALISA_HEADLESS=false
    volumes:
      - ./session:/app/session:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    command: ["xvfb-run", "-a", "--server-args=-screen 0 1440x900x24", "python", "-m", "app.workers.cheaper_runner"]

  # === POSTGRESQL ===
  postgres:
    image: postgres:16-alpine
    container_name: sp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartprice}
      POSTGRES_USER: ${POSTGRES_USER:-smartprice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartprice}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === REDIS ===
  redis:
    image: redis:7-alpine
    container_name: sp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # === NGINX ===
  nginx:
    image: nginx:alpine
    container_name: sp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/out:/usr/share/nginx/html:ro
      - certbot_etc:/etc/letsencrypt:ro
      - certbot_var:/var/lib/letsencrypt
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  certbot_etc:
  certbot_var:
