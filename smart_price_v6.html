<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Price</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; }
        h1 { font-size: 2.5em; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #888; margin-top: 8px; }
        .search-box { display: flex; gap: 10px; max-width: 700px; margin: 25px auto; }
        .search-box input { flex: 1; padding: 16px 22px; font-size: 17px; border: none; border-radius: 50px; background: #1a1a2e; color: #fff; outline: none; }
        .search-box button { padding: 16px 35px; font-size: 17px; border: none; border-radius: 50px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; cursor: pointer; }
        .search-box button:disabled { opacity: 0.6; }
        .main { display: grid; grid-template-columns: 1fr 320px; gap: 25px; margin-top: 25px; }
        @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
        .results { background: #1a1a2e; border-radius: 20px; padding: 20px; }
        .chat { background: #1a1a2e; border-radius: 20px; padding: 18px; display: flex; flex-direction: column; height: 450px; }
        .status-box { background: linear-gradient(135deg, #1e3a5f, #2d1b4e); border-radius: 12px; padding: 15px; margin-bottom: 15px; font-size: 14px; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #667eea; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .best-price { background: linear-gradient(135deg, #059669, #10b981); border-radius: 15px; padding: 22px; margin-bottom: 15px; }
        .best-price .label { font-size: 11px; text-transform: uppercase; opacity: 0.8; }
        .best-price .price { font-size: 2em; font-weight: bold; }
        .best-price .title { margin-top: 8px; opacity: 0.9; font-size: 14px; }
        .best-price .mp { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; margin-top: 8px; }
        .best-price .warning { background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 8px; margin-top: 10px; font-size: 12px; }
        .mp-wildberries { background: #cb11ab; }
        .mp-yandex { background: #fc0; color: #000; }
        .mp-ozon { background: #005bff; }
        .best-price a { display: inline-block; margin-top: 12px; padding: 10px 22px; background: rgba(255,255,255,0.2); border-radius: 20px; color: #fff; text-decoration: none; }
        .summary-box { background: rgba(102, 126, 234, 0.1); border: 1px solid rgba(102, 126, 234, 0.3); border-radius: 10px; padding: 12px; margin-bottom: 15px; font-size: 13px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; margin-top: 15px; }
        .product-card { background: #252540; border-radius: 10px; padding: 12px; }
        .product-card .price { font-size: 1.2em; font-weight: bold; color: #4ade80; }
        .product-card .title { font-size: 11px; color: #ccc; margin: 8px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-card .mp { font-size: 10px; padding: 2px 7px; border-radius: 8px; }
        .product-card .note { font-size: 10px; color: #f59e0b; margin-top: 5px; }
        .product-card a { display: block; margin-top: 8px; padding: 7px; background: rgba(102,126,234,0.3); border-radius: 6px; color: #fff; text-decoration: none; text-align: center; font-size: 12px; }
        .excluded { margin-top: 18px; padding-top: 12px; border-top: 1px solid #333; }
        .excluded summary { cursor: pointer; color: #888; font-size: 13px; }
        .excluded-item { font-size: 11px; color: #666; padding: 3px 0; }
        .chat-header { display: flex; align-items: center; gap: 10px; padding-bottom: 12px; border-bottom: 1px solid #333; }
        .chat-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #f472b6, #8b5cf6); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 12px 0; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 85%; padding: 10px 12px; border-radius: 10px; font-size: 13px; }
        .message.bot { background: linear-gradient(135deg, #f472b6, #8b5cf6); align-self: flex-start; }
        .message.user { background: #3b3b5c; align-self: flex-end; }
        .chat-input { display: flex; gap: 8px; padding-top: 12px; border-top: 1px solid #333; }
        .chat-input input { flex: 1; padding: 10px 14px; border: none; border-radius: 18px; background: #252540; color: #fff; outline: none; font-size: 13px; }
        .chat-input button { padding: 10px 18px; border: none; border-radius: 18px; background: linear-gradient(135deg, #f472b6, #8b5cf6); color: #fff; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Smart Price</h1>
            <p class="subtitle">Умный поиск лучших цен с AI</p>
        </header>
        <div class="search-box">
            <input type="text" id="q" placeholder="Например: poco f6 256gb" onkeypress="if(event.key==='Enter')search()">
            <button id="btn" onclick="search()">Найти</button>
        </div>
        <div class="main">
            <div class="results">
                <div id="status" class="status-box hidden"></div>
                <div id="res"><p style="color:#666;text-align:center;padding:40px;">Введите запрос</p></div>
            </div>
            <div class="chat">
                <div class="chat-header">
                    <div class="chat-avatar"></div>
                    <div><div style="font-weight:600;font-size:14px;">Фиксик</div><div style="font-size:10px;color:#888;">AI-помощник</div></div>
                </div>
                <div class="chat-messages" id="msgs"><div class="message bot">Привет! Помогу выбрать товар </div></div>
                <div class="chat-input">
                    <input type="text" id="chatIn" placeholder="Спросите..." onkeypress="if(event.key==='Enter')sendChat()">
                    <button onclick="sendChat()"></button>
                </div>
            </div>
        </div>
    </div>
<script>
const API='';
let ctx='';

function search(){
    const q=document.getElementById('q').value.trim();
    if(!q)return;
    const btn=document.getElementById('btn');
    btn.disabled=true;btn.textContent='Ищем...';
    const st=document.getElementById('status');
    st.classList.remove('hidden');
    st.innerHTML='<span class="spinner"></span> Начинаем...';
    document.getElementById('res').innerHTML='';

    const es=new EventSource(API+'/api/search/stream?q='+encodeURIComponent(q));
    es.onmessage=function(e){
        const d=JSON.parse(e.data);
        if(d.step==='done'){
            es.close();btn.disabled=false;btn.textContent='Найти';
            st.classList.add('hidden');
            render(d.result);
        }else{
            st.innerHTML='<span class="spinner"></span> '+d.message;
        }
    };
    es.onerror=function(){es.close();btn.disabled=false;btn.textContent='Найти';st.innerHTML='Ошибка. Попробуйте снова.';};
}

function render(d){
    const el=document.getElementById('res');
    let h='';
    ctx='Поиск: '+d.query+', найдено: '+d.total_found;

    // Фильтруем товары с ценой > 0
    let products=(d.matching_products||[]).filter(p=>{
        const price=p.price_num||parseInt(String(p.price||'').replace(/\D/g,''))||0;
        return price>0;
    });

    // Сортируем по цене
    products.sort((a,b)=>{
        const pa=a.price_num||parseInt(String(a.price||'').replace(/\D/g,''))||999999;
        const pb=b.price_num||parseInt(String(b.price||'').replace(/\D/g,''))||999999;
        return pa-pb;
    });

    // Лучшая цена - первый товар после сортировки
    const bp=products[0];
    if(bp){
        const price=bp.price_num||parseInt(String(bp.price||'').replace(/\D/g,''))||0;
        const mp=bp.marketplace||'';
        h+='<div class="best-price">';
        h+='<div class="label"> Лучшая цена</div>';
        h+='<div class="price">'+price.toLocaleString('ru')+' ₽</div>';
        h+='<div class="title">'+(bp.title||'')+'</div>';
        h+='<span class="mp mp-'+mp+'">'+mp+'</span>';
        if(mp==='wildberries'){
            h+='<div class="warning"> Цена с макс. SPP скидкой. Реальная может быть выше!</div>';
        }
        if(bp.url)h+='<br><a href="'+bp.url+'" target="_blank">В магазин </a>';
        h+='</div>';
    }

    if(d.summary)h+='<div class="summary-box"> '+d.summary+'</div>';

    h+='<h3 style="margin:12px 0;font-size:16px;">Результаты <span style="background:#4ade80;color:#000;padding:2px 8px;border-radius:12px;font-size:12px;">'+products.length+'</span></h3>';

    if(products.length>0){
        h+='<div class="products-grid">';
        products.forEach(function(p){
            const price=p.price_num||parseInt(String(p.price||'').replace(/\D/g,''))||0;
            const mp=p.marketplace||'';
            h+='<div class="product-card">';
            h+='<div class="price">'+price.toLocaleString('ru')+' ₽</div>';
            h+='<div class="title">'+(p.title||'')+'</div>';
            h+='<span class="mp mp-'+mp+'">'+mp+'</span>';
            if(mp==='wildberries')h+='<div class="note"> +SPP</div>';
            if(p.url)h+='<a href="'+p.url+'" target="_blank">Купить</a>';
            h+='</div>';
        });
        h+='</div>';
    }else{
        h+='<p style="color:#888;text-align:center;padding:30px;">Ничего не найдено</p>';
    }

    const ex=d.excluded||[];
    if(ex.length>0){
        h+='<details class="excluded"><summary>Отфильтровано: '+ex.length+'</summary>';
        ex.forEach(function(e){h+='<div class="excluded-item"> '+(e.title||'')+'  '+(e.reason||'')+'</div>';});
        h+='</details>';
    }
    el.innerHTML=h;
}

function sendChat(){
    const inp=document.getElementById('chatIn');
    const m=inp.value.trim();if(!m)return;
    const ms=document.getElementById('msgs');
    ms.innerHTML+='<div class="message user">'+m+'</div>';
    inp.value='';ms.scrollTop=ms.scrollHeight;
    fetch(API+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:m,context:ctx})})
    .then(r=>r.json()).then(d=>{ms.innerHTML+='<div class="message bot">'+d.response+'</div>';ms.scrollTop=ms.scrollHeight;})
    .catch(()=>{ms.innerHTML+='<div class="message bot">Ошибка </div>';});
}
</script>
</body>
</html>
